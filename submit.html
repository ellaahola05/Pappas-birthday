<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send a birthday message to Jonas</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap"
    rel="stylesheet" />
</head>

<body class="submit-page">

  <div class="submit-container">

    <!-- Language switcher -->
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <span>·</span>
      <button class="lang-btn" onclick="setLang('sv')">SV</button>
      <span>·</span>
      <button class="lang-btn" onclick="setLang('fi')">FI</button>
    </div>

    <div class="submit-header">
      <p class="date-label" style="margin-bottom: 1rem;">För Jonas · 09.04</p>
      <h1 id="t-title">Birthday message</h1>
      <p id="t-desc">
        Share a memory or birthday message for Jonas.
        It will appear in his card when he opens it.
        Write in any language you want.
      </p>
    </div>

    <form id="memoryForm">

      <div class="form-group">
        <label for="nameInput" id="t-name-label">Your name</label>
        <input type="text" id="nameInput" placeholder="What's your name?" required maxlength="60" />
      </div>

      <div class="form-group" style="margin-top: 1.5rem;">
        <label for="messageInput" id="t-msg-label">Your memory or birthday message</label>
        <textarea id="messageInput" rows="5" placeholder="Tell us something..." required maxlength="800"></textarea>
      </div>

      <div class="form-group photo-upload" style="margin-top: 1.5rem;">
        <label id="t-photo-label">Photo (optional)</label>
        <label class="photo-label-btn" for="photoInput" id="t-photo-btn">Choose a photo</label>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" />
        <img class="photo-preview" id="photoPreview" alt="Preview" />
        <p id="photoName" style="font-size:0.75rem; color: var(--muted); margin-top: 0.25rem;"></p>
      </div>

      <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
        <button type="submit" class="submit-btn" id="submitBtn">Send message</button>
        <p class="success-msg" id="successMsg"></p>
        <p class="success-msg" id="errorMsg" style="color: #c0392b;"></p>
      </div>

    </form>

  </div>

  <script>
    const translations = {
      en: {
        title: 'Birthday message',
        desc: 'Share a memory or birthday message for Jonas. It will appear in his card when he opens it. Write in any language you want.',
        nameLbl: 'Your name',
        namePh: "What's your name?",
        msgLbl: 'Your memory or birthday message',
        msgPh: 'Tell us something...',
        photoLbl: 'Photo (optional)',
        photoBtnLbl: 'Choose a photo',
        submit: 'Send message',
        saving: 'Saving...',
        sent: 'Sent ✓',
        success: 'Thank you! Your message has been saved. Jonas will see it on his birthday.',
        error: 'Something went wrong. Please try again.'
      },
      sv: {
        title: 'Ditt minne',
        desc: 'Dela ett minne eller ett meddelande till Jonas. Det dyker upp i hans kort när han öppnar det. Skriv på vilket språk du vill.',
        nameLbl: 'Ditt namn',
        namePh: 'Vad heter du?',
        msgLbl: 'Ditt minne eller meddelande',
        msgPh: 'Berätta något...',
        photoLbl: 'Foto (valfritt)',
        photoBtnLbl: 'Välj ett foto',
        submit: 'Skicka',
        saving: 'Sparar...',
        sent: 'Skickat ✓',
        success: 'Tack! Ditt minne är sparat. Jonas ser det på sin födelsedag.',
        error: 'Något gick fel. Försök igen.'
      },
      fi: {
        title: 'Muistosi',
        desc: 'Jaa muisto tai syntymäpäiväviesti Jonakselle. Se ilmestyy hänen korttiinsa kun hän avaa sen. Kirjoita millä kielellä haluat.',
        nameLbl: 'Nimesi',
        namePh: 'Mikä sinun nimesi on?',
        msgLbl: 'Muistosi tai viestisi',
        msgPh: 'Kerro jotain...',
        photoLbl: 'Kuva (valinnainen)',
        photoBtnLbl: 'Valitse kuva',
        submit: 'Lähetä',
        saving: 'Tallennetaan...',
        sent: 'Lähetetty ✓',
        success: 'Kiitos! Viestisi on tallennettu. Jonas näkee sen syntymäpäivänään.',
        error: 'Jotain meni pieleen. Yritä uudelleen.'
      }
    };

    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang];

      document.getElementById('t-title').textContent = t.title;
      document.getElementById('t-desc').textContent = t.desc;
      document.getElementById('t-name-label').textContent = t.nameLbl;
      document.getElementById('nameInput').placeholder = t.namePh;
      document.getElementById('t-msg-label').textContent = t.msgLbl;
      document.getElementById('messageInput').placeholder = t.msgPh;
      document.getElementById('t-photo-label').textContent = t.photoLbl;
      document.getElementById('t-photo-btn').textContent = t.photoBtnLbl;

      const btn = document.getElementById('submitBtn');
      if (!btn.disabled) btn.textContent = t.submit;

      // Update active button
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBaBMruVNGIE09Kumg0reFDWtao8i4Dk40",
      authDomain: "pappas-birthday.firebaseapp.com",
      projectId: "pappas-birthday",
      storageBucket: "pappas-birthday.firebasestorage.app",
      messagingSenderId: "223073240934",
      appId: "1:223073240934:web:f3e7cf983b9900520e2aa7"
    };

    const CLOUDINARY_CLOUD = 'dgmw7jpjd';
    const CLOUDINARY_PRESET = 'jonas_memories';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('photoInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const preview = document.getElementById('photoPreview');
      const nameEl = document.getElementById('photoName');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      nameEl.textContent = file.name;
    });

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_PRESET);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) throw new Error('Cloudinary upload failed');
      const data = await res.json();
      return data.secure_url;
    }

    document.getElementById('memoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const t = window.translations[window.currentLang];
      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      const name = document.getElementById('nameInput').value.trim();
      const message = document.getElementById('messageInput').value.trim();
      const photoFile = document.getElementById('photoInput').files[0];

      if (!name || !message) return;

      btn.disabled = true;
      btn.textContent = t.saving;
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      try {
        let photoUrl = null;
        if (photoFile) photoUrl = await uploadToCloudinary(photoFile);

        await addDoc(collection(db, 'memories'), {
          name, message, photoUrl,
          timestamp: serverTimestamp()
        });

        successMsg.textContent = t.success;
        successMsg.style.display = 'block';
        document.getElementById('memoryForm').reset();
        document.getElementById('photoPreview').style.display = 'none';
        document.getElementById('photoName').textContent = '';
        btn.textContent = t.sent;

      } catch (err) {
        console.error(err);
        errorMsg.textContent = t.error;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = translations[currentLang].submit;
      }
    });

    // Expose to window so the module script can access currentLang
    window.translations = translations;
    window.currentLang = 'en';
    Object.defineProperty(window, 'currentLang', {
      get: () => document.querySelector('.lang-btn.active')?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1] || 'en'
    });
  </script>

</body>

</html>
