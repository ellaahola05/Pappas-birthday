<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonas</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap"
    rel="stylesheet" />
</head>

<body class="password-page">

  <div class="password-container">
    <p class="date-label">09 . 04</p>
    <h1 class="name-title">Födelsedagsbok</h1>

    <div class="riddle">
      <p>It's not parked. It's displayed.</p>
      <p>Not a password — a lifestyle.</p>
      <p>The garage knows the answer. Do you?</p>
    </div>

    <div class="input-group">
      <input type="text" id="passwordInput" placeholder="_ _ _ - _ _" autocomplete="off" spellcheck="false" />
      <button id="submitBtn" onclick="checkPassword()">→</button>
    </div>

    <p class="error-msg" id="errorMsg">Fel svar. Försök igen.</p>
  </div>

  <div class="fade-overlay" id="fadeOverlay"></div>

  <script>
    function checkPassword() {
      const input = document.getElementById('passwordInput').value.trim().toUpperCase();
      const errorMsg = document.getElementById('errorMsg');

      if (input === 'JOB-95') {
        errorMsg.style.opacity = '0';
        document.getElementById('fadeOverlay').classList.add('fade-in');
        setTimeout(() => {
          window.location.href = 'card.html';
        }, 1200);
      } else {
        errorMsg.style.opacity = '1';
        document.getElementById('passwordInput').classList.add('shake');
        setTimeout(() => {
          document.getElementById('passwordInput').classList.remove('shake');
        }, 500);
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('passwordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkPassword();
      });
    });
  </script>

</body>

</html>
